services:
  postgres:
    image: postgres:16
    container_name: banking_postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - banking_network

  kafka:
    image: apache/kafka:4.1.2
    container_name: banking_kafka
    ports:
      - "${KAFKA_PORT}:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - banking_network

  debezium:
    image: debezium/connect:2.7.3.Final
    container_name: banking_debezium
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: banking-debezium-connect
      CONFIG_STORAGE_TOPIC: banking.debezium.connect-configs.v1
      OFFSET_STORAGE_TOPIC: banking.debezium.connect-offsets.v1
      STATUS_STORAGE_TOPIC: banking.debezium.connect-status.v1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      - kafka
      - postgres
    networks:
      - banking_network    
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: banking_minio
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - banking_network

  spark-master:
    image: spark:3.5.8-python3
    container_name: banking_spark_master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"
      - "${SPARK_MASTER_WEB_UI_PORT:-8080}:8080"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - ./src:/opt/spark/work-dir/src
    depends_on:
      - minio
    networks:
      - banking_network

  spark-worker:
    image: spark:3.5.8-python3
    container_name: banking_spark_worker
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
    ports:
      - "${SPARK_WORKER_WEB_UI_PORT:-8081}:8081"
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2G
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - ./src:/opt/spark/work-dir/src
    depends_on:
      - spark-master
    networks:
      - banking_network

  airflow-postgres:
    image: postgres:16
    container_name: banking_airflow_postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - banking_network

  airflow-init:
    image: apache/airflow:2.10.5-python3.11
    container_name: banking_airflow_init
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME:-admin}
      AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD:-admin}
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/requirements.txt"
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Local \
          --lastname Admin \
          --role Admin \
          --email admin@example.com || true
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    networks:
      - banking_network

  airflow-webserver:
    image: apache/airflow:2.10.5-python3.11
    container_name: banking_airflow_webserver
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8088}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: local-dev-secret-key
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      BRONZE_BUCKET: ${BRONZE_BUCKET}
      SILVER_BUCKET: ${SILVER_BUCKET}
      GOLD_BUCKET: ${GOLD_BUCKET}
      QUARANTINE_BUCKET: ${QUARANTINE_BUCKET:-banking-quarantine}
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/requirements.txt"
    command: webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    networks:
      - banking_network

  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.11
    container_name: banking_airflow_scheduler
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      minio:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: local-dev-secret-key
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      BRONZE_BUCKET: ${BRONZE_BUCKET}
      SILVER_BUCKET: ${SILVER_BUCKET}
      GOLD_BUCKET: ${GOLD_BUCKET}
      QUARANTINE_BUCKET: ${QUARANTINE_BUCKET:-banking-quarantine}
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/requirements.txt"
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    networks:
      - banking_network

volumes:
  postgres_data:
  kafka_data:
  minio_data:
  airflow_postgres_data:
  airflow_logs:

networks:
  banking_network:
    driver: bridge
